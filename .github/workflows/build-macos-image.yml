name: Build Full Installer ISO/DMG image

# ==============================================================================
# DOCNOTE
# ==============================================================================
# Purpose:
#   Build a full macOS installer ISO or DMG image by running the repository's
#   mkmaciso script on a GitHub-hosted macOS Intel runner.
#
# Scope:
#   - ISO output is intended for virtual machine installation workflows.
#   - DMG output is intended for raw flashing to USB or conversion to another
#     virtual-disk format when required.
#
# Design notes:
#   1. The old fork/star preflight lookup was removed because it could skip the
#      build job when it found a third-party fork artifact, leaving this workflow
#      without its own output.
#   2. Inputs are validated in a dedicated preflight job before the macOS runner
#      is allocated.
#   3. GitHub expression values are passed into shell scripts through env blocks,
#      not interpolated directly into shell logic.
#   4. The build job uses an Intel macOS runner because mkmaciso itself recommends
#      x86_64 Intel macOS for optimal results and because macOS VM installer media
#      workflows are commonly Intel-oriented.
#   5. Output detection is strict:
#        - image_format=iso accepts exactly one *.iso file.
#        - image_format=dmg accepts exactly one *.dmg.img or *.dmg file.
#      DMG output is normalized before upload so the final artifact filename ends
#      with exactly one .dmg extension, never .dmg.img and never .dmg.dmg.
#   6. actions/upload-artifact@v7 with archive:false supports unzipped single-file
#      upload. Therefore this workflow uploads exactly one output file.
#   7. In direct-upload mode with archive:false, the artifact name follows the
#      uploaded local filename. Therefore the DMG file is renamed before upload.
#   8. mkmaciso is syntax-checked with bash -n before execution.
#
# Operational notes:
#   - Full macOS installers are large. If the runner does not have enough free
#     workspace storage, mkmaciso can still fail even when the YAML is correct.
#   - Re-run only after checking the job log section "System Information" and the
#     free-space line printed before mkmaciso starts.
#
# ==============================================================================
# CHANGELOG
# ==============================================================================
# 2026-06-18
#   - Added DMG output filename normalization before artifact upload.
#   - Converted mkmaciso *.dmg.img output to a user-facing *.dmg filename.
#   - Added protection against duplicate trailing .dmg.dmg extension.
#   - Updated DOCNOTE to document direct-upload filename behavior.
#   - Updated DMG summary wording from DMG IMG to DMG.
#   - Kept ISO output behavior unchanged.
#
# 2026-06-14
#   - Removed third-party fork/stargazer preflight search logic.
#   - Added explicit input validation for macOS version and image format.
#   - Added least-privilege workflow permissions.
#   - Added concurrency guard per selected macOS version and output format.
#   - Added mkmaciso existence, executable-bit, and bash syntax checks.
#   - Replaced unsafe basename wildcard output detection with strict array logic.
#   - Added exact single-file validation before artifact upload.
#   - Added artifact URL and digest to the GitHub step summary when available.
#   - Hardened all embedded Bash blocks with set -Eeuo pipefail and safe quoting.
# ==============================================================================

on:
  workflow_dispatch:
    inputs:
      macos_version:
        description: "Choose a macOS version to build."
        required: true
        type: choice
        options:
          - ''
          - 'Tahoe'
          - 'Sequoia'
          - 'Sonoma'
          - 'Ventura'
          - 'Monterey'
          - 'Big Sur'
          - 'Catalina'
          - 'Mojave'
          - 'High Sierra'
          - 'Sierra'
          - 'El Capitan'
          - 'Yosemite'
          - 'Mavericks'
          - 'Mountain Lion'
          - 'Lion'
      image_format:
        description: "Choose 'iso' for virtual machines, 'dmg' for flash to USB drive."
        required: true
        type: choice
        options:
          - ''
          - 'iso'
          - 'dmg'

permissions:
  contents: read

concurrency:
  group: full-installer-${{ github.ref }}-${{ inputs.macos_version }}-${{ inputs.image_format }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  preflight:
    runs-on: ubuntu-slim
    timeout-minutes: 5
    outputs:
      build: ${{ steps.validate.outputs.build }}

    steps:
      - name: Validate workflow inputs
        id: validate
        env:
          MACOS_VERSION: ${{ inputs.macos_version }}
          IMAGE_FORMAT: ${{ inputs.image_format }}
        run: |
          set -Eeuo pipefail

          append_summary() {
            printf '%s\n' "$1" >> "$GITHUB_STEP_SUMMARY"
          }

          build='true'

          if [ -z "$MACOS_VERSION" ]; then
            append_summary '## Build skipped'
            append_summary ''
            append_summary 'No macOS version was selected. Re-run the workflow and select a valid macOS version.'
            build='false'
          fi

          if [ -z "$IMAGE_FORMAT" ]; then
            append_summary '## Build skipped'
            append_summary ''
            append_summary 'No image format was selected. Re-run the workflow and select either `iso` or `dmg`.'
            build='false'
          fi

          if [ "$build" = 'false' ]; then
            printf 'build=false\n' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          case "$MACOS_VERSION" in
            'Tahoe'|'Sequoia'|'Sonoma'|'Ventura'|'Monterey'|'Big Sur'|'Catalina'|'Mojave'|'High Sierra'|'Sierra'|'El Capitan'|'Yosemite'|'Mavericks'|'Mountain Lion'|'Lion')
              ;;
            *)
              append_summary '## Invalid macOS version'
              append_summary ''
              append_summary "Unsupported macOS version: \`$MACOS_VERSION\`."
              printf 'build=false\n' >> "$GITHUB_OUTPUT"
              exit 1
              ;;
          esac

          case "$IMAGE_FORMAT" in
            iso|dmg)
              ;;
            *)
              append_summary '## Invalid image format'
              append_summary ''
              append_summary "Unsupported image format: \`$IMAGE_FORMAT\`."
              printf 'build=false\n' >> "$GITHUB_OUTPUT"
              exit 1
              ;;
          esac

          append_summary '## Preflight passed'
          append_summary ''
          append_summary "macOS version: \`$MACOS_VERSION\`"
          append_summary "Image format: \`$IMAGE_FORMAT\`"

          printf 'build=true\n' >> "$GITHUB_OUTPUT"

  build-macos-image:
    needs: preflight
    if: needs.preflight.outputs.build == 'true'
    runs-on: macos-15-intel
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: System Information
        run: |
          set -Eeuo pipefail

          tmp_probe="$(mktemp)"
          trap 'rm -f "$tmp_probe"' EXIT

          printf 'Runner OS: %s %s\n' "$(sw_vers -productName)" "$(sw_vers -productVersion)"
          printf 'Architecture: %s\n' "$(uname -m)"
          printf '\nDisk for temporary probe:\n'
          df -h "$tmp_probe"
          printf '\nDisk for workspace:\n'
          df -h "$GITHUB_WORKSPACE"
          printf '\nRAM: %s\n' "$(top -l 1 | grep 'PhysMem' || true)"
          printf '\nCPU: %s\n' "$(sysctl -n machdep.cpu.brand_string)"
          printf 'Bash version: %s\n' "$BASH_VERSION"
          printf 'Python version: %s\n' "$(python3 --version 2>/dev/null || true)"
          printf 'hdiutil version: %s\n' "$(hdiutil version | head -n 1)"
          printf 'softwareupdate path: %s\n' "$(command -v softwareupdate || true)"

      - name: Validate mkmaciso
        run: |
          set -Eeuo pipefail

          if [ ! -f './mkmaciso' ]; then
            printf 'Required script not found: ./mkmaciso\n' >&2
            exit 1
          fi

          chmod +x ./mkmaciso

          if [ ! -x './mkmaciso' ]; then
            printf 'Required script is not executable after chmod: ./mkmaciso\n' >&2
            exit 1
          fi

          bash -n ./mkmaciso
          printf 'mkmaciso syntax check passed.\n'

      - name: Create macOS image
        id: create_image
        env:
          MACOS_VERSION: ${{ inputs.macos_version }}
          IMAGE_FORMAT: ${{ inputs.image_format }}
        run: |
          set -Eeuo pipefail
          shopt -s nullglob

          append_summary() {
            printf '%s\n' "$1" >> "$GITHUB_STEP_SUMMARY"
          }

          normalize_dmg_name() {
            original_name="$1"
            normalized_name="$original_name"

            # mkmaciso can create *.dmg.img for DMG output.
            # Final user-facing artifact must end with exactly one .dmg.
            case "$normalized_name" in
              *.img)
                normalized_name="${normalized_name%.img}"
                ;;
            esac

            # Collapse repeated trailing .dmg extensions:
            # file.dmg.dmg      -> file.dmg
            # file.dmg.dmg.dmg  -> file.dmg
            while :; do
              case "$normalized_name" in
                *.dmg.dmg)
                  normalized_name="${normalized_name%.dmg}"
                  ;;
                *)
                  break
                  ;;
              esac
            done

            case "$normalized_name" in
              *.dmg)
                ;;
              *)
                normalized_name="${normalized_name}.dmg"
                ;;
            esac

            printf '%s\n' "$normalized_name"
          }

          case "$IMAGE_FORMAT" in
            iso)
              expected_glob='*.iso'
              ;;
            dmg)
              expected_glob='*.dmg.img or *.dmg'
              ;;
            *)
              printf 'Unsupported image format: %s\n' "$IMAGE_FORMAT" >&2
              exit 1
              ;;
          esac

          printf 'Requested macOS version: %s\n' "$MACOS_VERSION"
          printf 'Requested image format: %s\n' "$IMAGE_FORMAT"

          printf '\nWorkspace before build:\n'
          pwd
          find . -maxdepth 1 -type f -print | sort

          printf '\nAvailable workspace storage before build:\n'
          df -h "$GITHUB_WORKSPACE"

          printf '\nRunning mkmaciso...\n'
          ./mkmaciso "$MACOS_VERSION" "$IMAGE_FORMAT"

          printf '\nWorkspace after build:\n'
          find . -maxdepth 1 -type f -print | sort

          if [ "$IMAGE_FORMAT" = 'iso' ]; then
            output_files=( ./*.iso )
          else
            output_files=( ./*.dmg.img ./*.dmg )
          fi

          if [ "${#output_files[@]}" -eq 0 ]; then
            printf 'No output file matched expected pattern: %s\n' "$expected_glob" >&2
            exit 1
          fi

          if [ "${#output_files[@]}" -gt 1 ]; then
            printf 'More than one output file matched expected pattern: %s\n' "$expected_glob" >&2
            printf 'Matched files:\n' >&2
            printf ' - %s\n' "${output_files[@]}" >&2
            exit 1
          fi

          image_path="${output_files[0]}"
          image_name="$(basename "$image_path")"

          if [ ! -s "$image_path" ]; then
            printf 'Output file is missing or empty: %s\n' "$image_path" >&2
            exit 1
          fi

          if [ "$IMAGE_FORMAT" = 'dmg' ]; then
            final_image_name="$(normalize_dmg_name "$image_name")"
            final_image_path="./$final_image_name"

            if [ "$final_image_name" != "$image_name" ]; then
              if [ -e "$final_image_path" ]; then
                printf 'Cannot rename DMG output because target already exists: %s\n' "$final_image_path" >&2
                exit 1
              fi

              printf 'Renaming DMG output: %s -> %s\n' "$image_name" "$final_image_name"
              mv "$image_path" "$final_image_path"

              image_path="$final_image_path"
              image_name="$final_image_name"
            fi
          fi

          image_size="$(du -h "$image_path" | awk '{print $1}')"
          image_sha256="$(shasum -a 256 "$image_path" | awk '{print $1}')"

          printf 'Image created successfully: %s (%s)\n' "$image_name" "$image_size"
          printf 'SHA256: %s\n' "$image_sha256"

          {
            printf 'image_path=%s\n' "$image_path"
            printf 'image_name=%s\n' "$image_name"
            printf 'image_size=%s\n' "$image_size"
            printf 'image_sha256=%s\n' "$image_sha256"
          } >> "$GITHUB_OUTPUT"

          append_summary '## Build output created'
          append_summary ''
          append_summary "File: \`$image_name\`"
          append_summary "Size: \`$image_size\`"
          append_summary "SHA256: \`$image_sha256\`"

      - name: Upload artifact
        id: upload_artifact
        uses: actions/upload-artifact@v7
        with:
          path: ${{ steps.create_image.outputs.image_path }}
          compression-level: 0
          retention-days: 15
          if-no-files-found: error
          archive: false

      - name: Summary
        if: always()
        env:
          CREATE_IMAGE_OUTCOME: ${{ steps.create_image.outcome }}
          JOB_STATUS: ${{ job.status }}
          MACOS_VERSION: ${{ inputs.macos_version }}
          IMAGE_FORMAT: ${{ inputs.image_format }}
          IMAGE_NAME: ${{ steps.create_image.outputs.image_name }}
          IMAGE_SIZE: ${{ steps.create_image.outputs.image_size }}
          IMAGE_SHA256: ${{ steps.create_image.outputs.image_sha256 }}
          ARTIFACT_URL: ${{ steps.upload_artifact.outputs.artifact-url }}
          ARTIFACT_DIGEST: ${{ steps.upload_artifact.outputs.artifact-digest }}
        run: |
          set -Eeuo pipefail

          append_summary() {
            printf '%s\n' "$1" >> "$GITHUB_STEP_SUMMARY"
          }

          if [ "$CREATE_IMAGE_OUTCOME" = 'failure' ]; then
            append_summary '## Build failed'
            append_summary ''
            append_summary '> [!WARNING]'
            append_summary '> mkmaciso failed while downloading macOS, creating the installer image, or writing the final output.'
            append_summary ''
            append_summary 'Check the following log sections first:'
            append_summary ''
            append_summary '1. `System Information` for runner architecture and free storage.'
            append_summary '2. `Validate mkmaciso` for script syntax or executable-bit problems.'
            append_summary '3. `Create macOS image` for the exact mkmaciso failure.'
          elif [ "$JOB_STATUS" = 'success' ]; then
            append_summary "## Successfully built **$IMAGE_NAME**"
            append_summary ''
            append_summary "macOS version: \`$MACOS_VERSION\`"
            append_summary "Image format: \`$IMAGE_FORMAT\`"
            append_summary "File size: \`$IMAGE_SIZE\`"
            append_summary "SHA256: \`$IMAGE_SHA256\`"

            if [ -n "$ARTIFACT_DIGEST" ]; then
              append_summary "Artifact digest: \`$ARTIFACT_DIGEST\`"
            fi

            if [ -n "$ARTIFACT_URL" ]; then
              append_summary ''
              append_summary "[Open artifact]($ARTIFACT_URL)"
            fi

            append_summary ''

            if [ "$IMAGE_FORMAT" = 'iso' ]; then
              append_summary '> [!IMPORTANT]'
              append_summary '> This ISO image is intended for creating macOS virtual machines on Proxmox VE, QEMU/KVM, VMware, and VirtualBox.'
            else
              append_summary '> [!IMPORTANT]'
              append_summary '> This DMG image is intended for flashing to a USB drive using Rufus on Windows or `dd` on Linux.'
            fi
          fi
