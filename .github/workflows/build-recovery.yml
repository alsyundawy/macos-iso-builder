name: Build Recovery ISO image

# ==============================================================================
# DOCNOTE
# ==============================================================================
# Purpose:
#   Build a macOS Recovery ISO from Apple's recovery assets by using
#   Acidanthera/OpenCorePkg macrecovery.py, then upload the result as a GitHub
#   Actions artifact and optionally publish it as a GitHub Release asset.
#
# Important implementation notes:
#   1. The ISO must be created from the com.apple.recovery.boot directory, not
#      directly from com.apple.recovery.boot/BaseSystem.dmg. Using BaseSystem.dmg
#      as hdiutil makehybrid source forces hdiutil to attach/mount Apple's DMG
#      first and can fail on GitHub-hosted macOS runners with:
#        hdiutil: makehybrid failed - Operation not permitted
#   2. Tahoe must use macrecovery.py with -os latest.
#   3. All workflow inputs are passed through environment variables before use in
#      shell scripts to avoid quoting and injection problems.
#   4. Release tags are sanitized before use. Empty sanitized tags are rejected.
#
# CHANGELOG
# ==============================================================================
# 2026-06-14
#   - Fixed Sequoia/non-Sonoma ISO creation failure by building ISO from the
#     recovery folder instead of directly from BaseSystem.dmg.
#   - Removed unsafe direct use of GitHub expression values inside shell logic.
#   - Added strict validation for BaseSystem.dmg and BaseSystem.chunklist.
#   - Added retry logic for macrecovery.py download and RecoveryOS download.
#   - Kept runner pinned to macos-26-intel for deterministic Intel-based hdiutil.
# ==============================================================================

on:
  workflow_dispatch:
    inputs:
      macos_version:
        description: 'Select a macOS version to build'
        required: true
        type: choice
        options:
          - ''
          - 'Tahoe'
          - 'Sequoia'
          - 'Sonoma'
          - 'Ventura'
          - 'Monterey'
          - 'Big Sur'
          - 'Catalina'
          - 'Mojave'
          - 'High Sierra'
      release_tag:
        description: 'Optional: tag the build, for example v15-recovery, to upload it to Releases for long-term storage'
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: recovery-iso-${{ github.ref }}-${{ inputs.macos_version }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  MACRECOVERY_URL: https://raw.githubusercontent.com/acidanthera/OpenCorePkg/master/Utilities/macrecovery/macrecovery.py

jobs:
  preflight:
    runs-on: ubuntu-slim
    timeout-minutes: 5
    outputs:
      build: ${{ steps.validate.outputs.build }}

    steps:
      - name: Validate workflow inputs
        id: validate
        env:
          MACOS_VERSION: ${{ inputs.macos_version }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -Eeuo pipefail

          append_summary() {
            printf '%s\n' "$1" >> "$GITHUB_STEP_SUMMARY"
          }

          if [ -z "$MACOS_VERSION" ]; then
            append_summary '## Build skipped'
            append_summary ''
            append_summary 'No macOS version was selected. Re-run the workflow and select a valid macOS version.'
            printf 'build=false\n' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          case "$MACOS_VERSION" in
            'High Sierra'|'Mojave'|'Catalina'|'Big Sur'|'Monterey'|'Ventura'|'Sonoma'|'Sequoia'|'Tahoe')
              ;;
            *)
              append_summary '## Invalid macOS version'
              append_summary ''
              append_summary "Unsupported macOS version: \`$MACOS_VERSION\`."
              printf 'build=false\n' >> "$GITHUB_OUTPUT"
              exit 1
              ;;
          esac

          if [ -n "$RELEASE_TAG" ]; then
            append_summary "Release upload requested with raw tag: \`$RELEASE_TAG\`."
          fi

          printf 'build=true\n' >> "$GITHUB_OUTPUT"

  build-recovery-iso:
    needs: preflight
    if: needs.preflight.outputs.build == 'true'
    runs-on: macos-26-intel
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: System Information
        run: |
          set -Eeuo pipefail

          tmp_probe="$(mktemp)"
          trap 'rm -f "$tmp_probe"' EXIT

          printf 'Runner OS: %s %s\n' "$(sw_vers -productName)" "$(sw_vers -productVersion)"
          printf 'Architecture: %s\n' "$(uname -m)"
          printf '\nDisk:\n'
          df -h "$tmp_probe"
          printf '\nRAM: %s\n' "$(top -l 1 | grep 'PhysMem' || true)"
          printf '\nCPU: %s\n' "$(sysctl -n machdep.cpu.brand_string)"
          printf '\nPython version: %s\n' "$(python3 --version)"
          printf 'hdiutil version: %s\n' "$(hdiutil version | head -n 1)"
          printf 'gh version: %s\n' "$(gh --version | head -n 1)"

      - name: Download macrecovery.py
        run: |
          set -Eeuo pipefail

          printf 'Downloading macrecovery.py from Acidanthera/OpenCorePkg...\n'
          curl \
            --fail \
            --location \
            --show-error \
            --silent \
            --retry 5 \
            --retry-delay 2 \
            --retry-all-errors \
            --connect-timeout 10 \
            --max-time 60 \
            --output macrecovery.py \
            "$MACRECOVERY_URL"

          test -s macrecovery.py
          python3 -m py_compile macrecovery.py

      - name: Get version info
        id: version_info
        env:
          MACOS_VERSION: ${{ inputs.macos_version }}
        run: |
          set -Eeuo pipefail

          case "$MACOS_VERSION" in
            'High Sierra')
              board_id='Mac-7BA5B2D9E42DDD94'
              model='00000000000J80300'
              version_name='High Sierra'
              version_slug='High_Sierra'
              os_type='default'
              ;;
            'Mojave')
              board_id='Mac-7BA5B2DFE22DDD8C'
              model='00000000000KXPG00'
              version_name='Mojave'
              version_slug='Mojave'
              os_type='default'
              ;;
            'Catalina')
              board_id='Mac-CFF7D910A743CAAF'
              model='00000000000PHCD00'
              version_name='Catalina'
              version_slug='Catalina'
              os_type='default'
              ;;
            'Big Sur')
              board_id='Mac-2BD1B31983FE1663'
              model='00000000000000000'
              version_name='Big Sur'
              version_slug='Big_Sur'
              os_type='default'
              ;;
            'Monterey')
              board_id='Mac-E43C1C25D4880AD6'
              model='00000000000000000'
              version_name='Monterey'
              version_slug='Monterey'
              os_type='default'
              ;;
            'Ventura')
              board_id='Mac-B4831CEBD52A0C4C'
              model='00000000000000000'
              version_name='Ventura'
              version_slug='Ventura'
              os_type='default'
              ;;
            'Sonoma')
              board_id='Mac-827FAC58A8FDFA22'
              model='00000000000000000'
              version_name='Sonoma'
              version_slug='Sonoma'
              os_type='default'
              ;;
            'Sequoia')
              board_id='Mac-7BA5B2D9E42DDD94'
              model='00000000000000000'
              version_name='Sequoia'
              version_slug='Sequoia'
              os_type='default'
              ;;
            'Tahoe')
              board_id='Mac-CFF7D910A743CAAF'
              model='00000000000000000'
              version_name='Tahoe'
              version_slug='Tahoe'
              os_type='latest'
              ;;
            *)
              printf 'Unsupported macOS version: %s\n' "$MACOS_VERSION" >&2
              exit 1
              ;;
          esac

          {
            printf 'board_id=%s\n' "$board_id"
            printf 'model=%s\n' "$model"
            printf 'version_name=%s\n' "$version_name"
            printf 'version_slug=%s\n' "$version_slug"
            printf 'os_type=%s\n' "$os_type"
          } >> "$GITHUB_OUTPUT"

      - name: Download macOS Recovery
        id: download_recovery_image
        env:
          BOARD_ID: ${{ steps.version_info.outputs.board_id }}
          MODEL: ${{ steps.version_info.outputs.model }}
          OS_TYPE: ${{ steps.version_info.outputs.os_type }}
          VERSION_NAME: ${{ steps.version_info.outputs.version_name }}
        run: |
          set -Eeuo pipefail

          recovery_dir='com.apple.recovery.boot'
          recovery_dmg="${recovery_dir}/BaseSystem.dmg"
          recovery_chunklist="${recovery_dir}/BaseSystem.chunklist"

          printf 'Downloading macOS %s recovery...\n' "$VERSION_NAME"
          rm -rf "$recovery_dir"

          for attempt in 1 2 3; do
            printf 'macrecovery attempt %s/3...\n' "$attempt"

            if python3 macrecovery.py -b "$BOARD_ID" -m "$MODEL" -os "$OS_TYPE" download; then
              break
            fi

            if [ "$attempt" -eq 3 ]; then
              printf 'macrecovery.py failed after 3 attempts.\n' >&2
              exit 1
            fi

            sleep "$((attempt * 10))"
          done

          if [ ! -s "$recovery_dmg" ]; then
            printf 'Recovery DMG was not created or is empty: %s\n' "$recovery_dmg" >&2
            find "$recovery_dir" -maxdepth 2 -type f -print 2>/dev/null || true
            exit 1
          fi

          if [ ! -s "$recovery_chunklist" ]; then
            printf 'Recovery chunklist was not created or is empty: %s\n' "$recovery_chunklist" >&2
            find "$recovery_dir" -maxdepth 2 -type f -print 2>/dev/null || true
            exit 1
          fi

          printf 'Recovery files:\n'
          find "$recovery_dir" -maxdepth 2 -type f -print -exec du -h {} \;

      - name: Create Recovery ISO
        id: create_iso
        env:
          VERSION_SLUG: ${{ steps.version_info.outputs.version_slug }}
        run: |
          set -Eeuo pipefail

          iso_file="macOS_${VERSION_SLUG}_Recovery.iso"
          recovery_dir='com.apple.recovery.boot'
          recovery_dmg="${recovery_dir}/BaseSystem.dmg"
          recovery_chunklist="${recovery_dir}/BaseSystem.chunklist"
          volume_name="${VERSION_SLUG}_Recovery"

          if [ ! -d "$recovery_dir" ]; then
            printf 'Missing recovery directory: %s\n' "$recovery_dir" >&2
            exit 1
          fi

          if [ ! -s "$recovery_dmg" ]; then
            printf 'Missing recovery DMG: %s\n' "$recovery_dmg" >&2
            find "$recovery_dir" -maxdepth 2 -type f -print 2>/dev/null || true
            exit 1
          fi

          if [ ! -s "$recovery_chunklist" ]; then
            printf 'Missing recovery chunklist: %s\n' "$recovery_chunklist" >&2
            find "$recovery_dir" -maxdepth 2 -type f -print 2>/dev/null || true
            exit 1
          fi

          printf 'Validating downloaded recovery DMG metadata...\n'
          hdiutil imageinfo "$recovery_dmg" >/dev/null

          printf 'Creating ISO from recovery folder, not by mounting BaseSystem.dmg...\n'
          rm -f "$iso_file"

          hdiutil makehybrid \
            -iso \
            -joliet \
            -default-volume-name "$volume_name" \
            -o "$iso_file" \
            "$recovery_dir"

          if [ ! -s "$iso_file" ]; then
            printf 'ISO was not created or is empty: %s\n' "$iso_file" >&2
            exit 1
          fi

          iso_size="$(du -h "$iso_file" | awk '{print $1}')"
          printf 'ISO created successfully: %s (%s)\n' "$iso_file" "$iso_size"
          printf 'iso_file=%s\n' "$iso_file" >> "$GITHUB_OUTPUT"

      - name: Compress ISO
        id: compress_iso
        env:
          ISO_FILE: ${{ steps.create_iso.outputs.iso_file }}
        run: |
          set -Eeuo pipefail

          if [ ! -s "$ISO_FILE" ]; then
            printf 'Missing ISO file: %s\n' "$ISO_FILE" >&2
            exit 1
          fi

          zip_file="${ISO_FILE}.zip"
          rm -f "$zip_file"

          printf 'Compressing ISO with zip: %s\n' "$zip_file"
          zip -9 -j "$zip_file" "$ISO_FILE"

          if [ ! -s "$zip_file" ]; then
            printf 'ZIP was not created or is empty: %s\n' "$zip_file" >&2
            exit 1
          fi

          zip_size="$(du -h "$zip_file" | awk '{print $1}')"
          printf 'ZIP created successfully: %s (%s)\n' "$zip_file" "$zip_size"
          printf 'compressed_file=%s\n' "$zip_file" >> "$GITHUB_OUTPUT"

      - name: Upload Recovery ISO artifact
        uses: actions/upload-artifact@v7
        with:
          name: macOS_${{ steps.version_info.outputs.version_slug }}_Recovery
          path: ${{ steps.compress_iso.outputs.compressed_file }}
          compression-level: 0
          retention-days: 15
          if-no-files-found: error
          archive: false

      - name: Sanitize release tag
        id: sanitize_tag
        if: ${{ inputs.release_tag != '' }}
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -Eeuo pipefail

          sanitized_tag="$(printf '%s' "$RELEASE_TAG" \
            | LC_ALL=C tr -c '[:alnum:]._-' '-' \
            | sed -E 's/-+/-/g; s/^-//; s/-$//')"

          if [ -z "$sanitized_tag" ]; then
            printf 'Release tag becomes empty after sanitization. Raw value: %s\n' "$RELEASE_TAG" >&2
            exit 1
          fi

          printf 'sanitized_tag=%s\n' "$sanitized_tag" >> "$GITHUB_OUTPUT"

      - name: Create Release
        if: ${{ inputs.release_tag != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ZIP_FILE: ${{ steps.compress_iso.outputs.compressed_file }}
          SANITIZED_TAG: ${{ steps.sanitize_tag.outputs.sanitized_tag }}
          VERSION_NAME: ${{ steps.version_info.outputs.version_name }}
        run: |
          set -Eeuo pipefail

          if [ ! -s "$ZIP_FILE" ]; then
            printf 'Missing ZIP release asset: %s\n' "$ZIP_FILE" >&2
            exit 1
          fi

          title="macOS ${VERSION_NAME} Recovery"
          notes_file='RELEASE_NOTES.md'

          {
            printf '## macOS %s Recovery ISO\n' "$VERSION_NAME"
            printf '\n'
            printf 'Built by GitHub Actions from Apple Recovery assets using Acidanthera/OpenCorePkg macrecovery.py.\n'
            printf '\n'
            printf 'Asset:\n'
            printf '- %s\n' "$ZIP_FILE"
          } > "$notes_file"

          gh release create "$SANITIZED_TAG" "$ZIP_FILE" \
            --title "$title" \
            --notes-file "$notes_file"

      - name: Summary
        if: always()
        env:
          DOWNLOAD_OUTCOME: ${{ steps.download_recovery_image.outcome }}
          CREATE_ISO_OUTCOME: ${{ steps.create_iso.outcome }}
          COMPRESS_OUTCOME: ${{ steps.compress_iso.outcome }}
          JOB_STATUS: ${{ job.status }}
          VERSION_NAME: ${{ steps.version_info.outputs.version_name }}
          ZIP_FILE: ${{ steps.compress_iso.outputs.compressed_file }}
        run: |
          set -Eeuo pipefail

          append_summary() {
            printf '%s\n' "$1" >> "$GITHUB_STEP_SUMMARY"
          }

          if [ "$DOWNLOAD_OUTCOME" = 'failure' ]; then
            append_summary '## Download RecoveryOS failed'
            append_summary ''
            append_summary '> [!WARNING]'
            append_summary '> Apple recovery download or GitHub runner networking failed. Re-run the workflow once; the retry logic already made three attempts in this run.'
          elif [ "$CREATE_ISO_OUTCOME" = 'failure' ]; then
            append_summary '## ISO creation failed'
            append_summary ''
            append_summary '> [!WARNING]'
            append_summary '> Recovery files were downloaded, but hdiutil could not create the ISO. Check the hdiutil output above.'
          elif [ "$COMPRESS_OUTCOME" = 'failure' ]; then
            append_summary '## ISO compression failed'
            append_summary ''
            append_summary '> [!WARNING]'
            append_summary '> ISO creation succeeded, but ZIP compression failed. Check disk space and zip output above.'
          elif [ "$JOB_STATUS" = 'success' ]; then
            append_summary "## Successfully built **macOS ${VERSION_NAME} Recovery** ISO"
            append_summary ''
            append_summary "Artifact ZIP: \`${ZIP_FILE}\`"
            append_summary ''
            append_summary '> [!IMPORTANT]'
            append_summary '> This ISO image is intended for creating macOS virtual machines on Proxmox VE, QEMU/KVM, VMware, and VirtualBox with a proper OpenCore/bootloader setup.'
          fi
